<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#000000;stop-opacity:0.45"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.04"/>
    </linearGradient>
    <linearGradient id="bottom" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#000000;stop-opacity:0"/>
      <stop offset="100%" style="stop-color:#000000;stop-opacity:0.5"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill=""/>
  <rect width="1200" height="630" fill="url(#grad)"/>
  <!-- Bottom fade -->
  <rect x="0" y="400" width="1200" height="230" fill="url(#bottom)"/>
  <!-- Decorative dots - top right -->
  <g opacity="0.12" fill="white">
    <circle cx="900" cy="80" r="4"/><circle cx="940" cy="80" r="4"/><circle cx="980" cy="80" r="4"/><circle cx="1020" cy="80" r="4"/><circle cx="1060" cy="80" r="4"/>
    <circle cx="900" cy="120" r="4"/><circle cx="940" cy="120" r="4"/><circle cx="980" cy="120" r="4"/><circle cx="1020" cy="120" r="4"/><circle cx="1060" cy="120" r="4"/>
    <circle cx="900" cy="160" r="4"/><circle cx="940" cy="160" r="4"/><circle cx="980" cy="160" r="4"/><circle cx="1020" cy="160" r="4"/><circle cx="1060" cy="160" r="4"/>
    <circle cx="900" cy="200" r="4"/><circle cx="940" cy="200" r="4"/><circle cx="980" cy="200" r="4"/><circle cx="1020" cy="200" r="4"/><circle cx="1060" cy="200" r="4"/>
  </g>
  <!-- Left accent bar -->
  <rect x="0" y="0" width="8" height="630" fill="rgba(255,255,255,0.25)"/>
  <!-- Top accent line -->
  <rect x="8" y="0" width="1192" height="3" fill="rgba(255,255,255,0.2)"/>
  <!-- Category label -->
  <text x="80" y="80" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="bold"
        fill="rgba(255,255,255,0.65)" letter-spacing="5"></text>
  <!-- EXPAT JAPAN brand -->
  <text x="1130" y="80" font-family="Georgia, serif" font-size="22" font-weight="bold"
        fill="rgba(255,255,255,0.5)" text-anchor="end" letter-spacing="2">EXPAT JAPAN</text>
  <!-- Title line 1 -->
  <text x="80" y="295" font-family="Georgia, 'Times New Roman', serif" font-size="" font-weight="bold"
        fill="white" text-anchor="start"
        style="filter: drop-shadow(2px 2px 4px rgba(0,0,0,0.5))"></text>
  <!-- Title line 2 -->
  <text x="80" y="313" font-family="Georgia, 'Times New Roman', serif" font-size="" font-weight="bold"
        fill="rgba(255,255,255,0.9)" text-anchor="start"></text>
  <!-- Bottom bar -->
  <rect x="0" y="600" width="1200" height="30" fill="rgba(0,0,0,0.3)"/>
  <!-- URL -->
  <text x="80" y="621" font-family="Arial, Helvetica, sans-serif" font-size="18"
        fill="rgba(255,255,255,0.7)">expatsjapan.com</text>
  <!-- Arrow decoration -->
  <text x="1130" y="621" font-family="Arial, sans-serif" font-size="18"
        fill="rgba(255,255,255,0.5)" text-anchor="end">→ Read More</text>
</svg>