baseURL: https://expatsjapan.com/
languageCode: en-us
title: Expat Japan
theme: PaperMod

# Google Analytics GA4 Measurement ID (例: G-XXXXXXXXXX)
# analytics.google.comで取得後、ここに記入してください
googleAnalytics: ""

pagination:
  pagerSize: 10

enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false

minify:
  disableXML: true
  minifyOutput: true

params:
  env: production
  title: Expat Japan
  description: "The complete guide to living in Japan as a foreigner. Visa, jobs, insurance, banking and daily life explained in English."
  keywords: [Japan, expat, foreigner, visa, work, living in Japan]
  author: Expat Japan Team
  DateFormat: "January 2, 2006"
  defaultTheme: light
  disableThemeToggle: true
  ShowReadingTime: true
  ShowShareButtons: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowWordCount: false
  ShowRssButtonInSectionTermList: true
  UseHugoToc: true
  disableSpecial1stPost: false
  disableScrollToTop: false
  comments: false
  hidemeta: false
  hideSummary: false
  showtoc: true
  tocopen: false

  homeInfoParams:
    Title: "Live in Japan — The Foreigner's Guide"
    Content: >
      Your complete English guide to life in Japan.
      Visa, jobs, insurance, banking, phones and more — all explained simply.

  assets:
    favicon: "/favicon.png"
    favicon16x16: "/favicon.png"
    favicon32x32: "/favicon.png"
    apple_touch_icon: "/favicon.png"

  socialIcons:
    - name: facebook
      url: "https://facebook.com/"

  analytics:
    google:
      SiteVerificationTag: ""

  cover:
    hidden: false
    hiddenInList: false
    hiddenInSingle: false
    linkFullImages: true

  editPost:
    URL: ""
    Text: ""
    appendFilePath: true

  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 1000
    threshold: 0.4
    minMatchCharLength: 0
    limit: 10
    keys: ["title", "permalink", "summary", "content"]

menu:
  main:
    - identifier: visa
      name: Visa & Status
      url: /visa/
      weight: 10
    - identifier: jobs
      name: Jobs & Career
      url: /jobs/
      weight: 20
    - identifier: daily-life
      name: Daily Life
      url: /daily-life/
      weight: 30
    - identifier: health
      name: Health & Insurance
      url: /health/
      weight: 40
    - identifier: money
      name: Money & Finance
      url: /money/
      weight: 50
    - identifier: culture
      name: Culture
      url: /culture/
      weight: 55
    - identifier: about
      name: About
      url: /about/
      weight: 60
    - identifier: search
      name: Search
      url: /search/
      weight: 70

outputs:
  home:
    - HTML
    - RSS
    - JSON
